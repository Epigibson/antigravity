service: nexus-backend-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'prod'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 1024
  architecture: arm64
  timeout: 30
  environment:
    # Estas variables deben existir en el entorno al momento del despliegue 
    # o puedes usar Parameter Store / Secrets Manager
    DATABASE_URL: ${env:DATABASE_URL, ''}
    SUPABASE_URL: ${env:SUPABASE_URL, ''}
    SUPABASE_ANON_KEY: ${env:SUPABASE_ANON_KEY, ''}
    SECRET_KEY: ${env:SECRET_KEY, 'dev-secret-key-change-in-production'}
    ACCESS_TOKEN_EXPIRE_MINUTES: ${env:ACCESS_TOKEN_EXPIRE_MINUTES, '1440'}
    CORS_ORIGINS: ${env:CORS_ORIGINS, '["http://localhost:3000","https://antigravity-production-a677.up.railway.app"]'}
    DEBUG: ${env:DEBUG, 'false'}
    FRONTEND_URL: ${env:FRONTEND_URL, 'https://antigravity-production-a677.up.railway.app'}
    STRIPE_SECRET_KEY: ${env:STRIPE_SECRET_KEY, ''}
    STRIPE_PUBLISHABLE_KEY: ${env:STRIPE_PUBLISHABLE_KEY, ''}
    STRIPE_WEBHOOK_SECRET: ${env:STRIPE_WEBHOOK_SECRET, ''}
    STRIPE_PREMIUM_PRICE_ID: ${env:STRIPE_PREMIUM_PRICE_ID, ''}
    ENVIRONMENT: production
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
        - https://qegsj4k7m5.execute-api.us-east-1.amazonaws.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      allowCredentials: true

functions:
  api:
    handler: app.main.handler
    events:
      - httpApi:
          path: /
          method: '*'
      - httpApi:
          path: /{proxy+}
          method: '*'

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true # Fuerza siempre el uso de Docker para compilar (incluso en GitHub Actions) para evitar error de GLIBC
    slim: true
