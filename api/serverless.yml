service: nexus-backend-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'prod'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 1024
  architecture: arm64
  timeout: 30
  environment:
    # 🔐 Advanced Security: Fetching secrets from AWS Systems Manager (SSM) Parameter Store
    DATABASE_URL: ${ssm:/nexus/${sls:stage}/database_url, env:DATABASE_URL, ''}
    SUPABASE_URL: ${ssm:/nexus/${sls:stage}/supabase_url, env:SUPABASE_URL, ''}
    SUPABASE_ANON_KEY: ${ssm:/nexus/${sls:stage}/supabase_anon_key, env:SUPABASE_ANON_KEY, ''}
    SECRET_KEY: ${ssm:/nexus/${sls:stage}/secret_key, env:SECRET_KEY, 'dev-secret-key-change-in-production'}
    ACCESS_TOKEN_EXPIRE_MINUTES: ${env:ACCESS_TOKEN_EXPIRE_MINUTES, '15'}
    CORS_ORIGINS: ${env:CORS_ORIGINS, '["http://localhost:3000","https://nexusproject.pro", "https://master.d3cehroonlwhdk.amplifyapp.com"]'}
    DEBUG: ${env:DEBUG, 'false'}
    FRONTEND_URL: ${env:FRONTEND_URL, 'https://nexusproject.pro'}
    STRIPE_SECRET_KEY: ${ssm:/nexus/${sls:stage}/stripe_secret_key, env:STRIPE_SECRET_KEY, ''}
    STRIPE_PUBLISHABLE_KEY: ${ssm:/nexus/${sls:stage}/stripe_publishable_key, env:STRIPE_PUBLISHABLE_KEY, ''}
    STRIPE_WEBHOOK_SECRET: ${ssm:/nexus/${sls:stage}/stripe_webhook_secret, env:STRIPE_WEBHOOK_SECRET, ''}
    STRIPE_PREMIUM_PRICE_ID: ${env:STRIPE_PREMIUM_PRICE_ID, ''}
    ENVIRONMENT: production
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
        - https://nexusproject.pro
        - https://master.d3cehroonlwhdk.amplifyapp.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      allowCredentials: true

package:
  patterns:
    - '!**/.env'
    - '!**/.env.*'
    - '!**/tests/**'
    - '!**/__pycache__/**'

functions:
  api:
    handler: app.main.handler
    events:
      - httpApi:
          path: /
          method: '*'
      - httpApi:
          path: /{proxy+}
          method: '*'

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true # Fuerza siempre el uso de Docker para compilar (incluso en GitHub Actions) para evitar error de GLIBC
    slim: true
